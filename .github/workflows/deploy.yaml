name: Pipeline CI/CD

on:
    push:
        branches:
          - main

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: Build ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6.1.0  
        with:
          role-to-assume: arn:aws:iam::149729185352:role/GitHubActionsRepoApp 
          aws-region: us-east-2
      
      - name: Amazon ECR "Login" Action for Github Actions
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build Image
        run: |
          docker build -t meu-website:v1.0 .
          docker tag meu-website:v1.0 149729185352.dkr.ecr.us-east-2.amazonaws.com/site-prod:v1.0
          docker push 149729185352.dkr.ecr.us-east-2.amazonaws.com/site-prod:v1.0
  
  job2:
    name: Deploy EC2
    needs: job1
    env:
      INSTANCE_KEY: ${{secrets.INSTANCE_KEY}}
      PUBLIC_IP: ${{secrets.PUBLIC_IP}}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy EC2 SSH
        run: |
          echo "$INSTANCE_KEY" > chave-site-prod.pem
          chmod 400 chave-site-prod.pem
          
          ssh -i chave-site-prod.pem -o StrictHostKeyChecking=no ubuntu@$PUBLIC_IP \
            "aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 149729185352.dkr.ecr.us-east-2.amazonaws.com"
          
          ssh -i chave-site-prod.pem -o StrictHostKeyChecking=no ubuntu@$PUBLIC_IP \
            "docker pull 149729185352.dkr.ecr.us-east-2.amazonaws.com/site-prod:v1.0"
       
          ssh -i chave-site-prod.pem -o StrictHostKeyChecking=no ubuntu@$PUBLIC_IP \
            "docker run -d -p 80:80 --name site 149729185352.dkr.ecr.us-east-2.amazonaws.com/site-prod:v1.0"
    
          rm -f chave-site-prod.pem